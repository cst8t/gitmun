<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gitmun</title>
    <script>
      (() => {
        try {
          const mode = localStorage.getItem("gitmun.themeMode");
          if (mode === "Light") {
            document.documentElement.dataset.theme = "light";
          } else if (mode === "Dark") {
            document.documentElement.dataset.theme = "dark";
          } else if (!document.documentElement.dataset.theme) {
            document.documentElement.dataset.theme =
              window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
        } catch {}
      })();
    </script>
    <style>
      html, body { background: #f4f6fb; }
      html[data-theme="dark"], html[data-theme="dark"] body { background: #0f1117; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/windows/about.tsx"></script>
  </body>
</html>
