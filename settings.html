<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gitmun settings</title>
    <script>
      (() => {
        try {
          const mode = localStorage.getItem("gitmun.themeMode");
          const theme = mode === "Light"
            ? "light"
            : mode === "Dark"
              ? "dark"
              : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
        } catch {}
      })();
    </script>
    <style>
      html, body { background: #f4f6fb; }
      html[data-theme="dark"], html[data-theme="dark"] body { background: #0f1117; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/windows/settings.tsx"></script>
  </body>
</html>
