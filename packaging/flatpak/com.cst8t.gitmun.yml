app-id: com.cst8t.gitmun
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: gitmun
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: gitmun-files
    buildsystem: simple
    build-commands:
      - |
        BIN_PATH=""
        for candidate in \
          usr/bin/gitmun \
          usr/lib/gitmun/gitmun \
          rootfs/usr/bin/gitmun \
          rootfs/usr/lib/gitmun/gitmun; do
          if [ -f "$candidate" ]; then
            BIN_PATH="$candidate"
            break
          fi
        done

        if [ -z "$BIN_PATH" ]; then
          echo "Unable to locate gitmun binary in extracted rootfs sources." >&2
          find . -maxdepth 5 -type f | sort >&2
          exit 1
        fi

        install -Dm755 "$BIN_PATH" /app/bin/gitmun
      - |
        DESKTOP_PATH=""
        for candidate in \
          usr/share/applications/gitmun.desktop \
          rootfs/usr/share/applications/gitmun.desktop; do
          if [ -f "$candidate" ]; then
            DESKTOP_PATH="$candidate"
            break
          fi
        done

        if [ -z "$DESKTOP_PATH" ]; then
          echo "Unable to locate gitmun.desktop in extracted rootfs sources." >&2
          find . -maxdepth 5 -type f | sort >&2
          exit 1
        fi

        install -Dm644 "$DESKTOP_PATH" /app/share/applications/com.cst8t.gitmun.desktop
      - |
        ICON_PATH=""
        for candidate in \
          usr/share/icons/hicolor/128x128/apps/gitmun.png \
          rootfs/usr/share/icons/hicolor/128x128/apps/gitmun.png; do
          if [ -f "$candidate" ]; then
            ICON_PATH="$candidate"
            break
          fi
        done

        if [ -n "$ICON_PATH" ]; then
          install -Dm644 "$ICON_PATH" /app/share/icons/hicolor/128x128/apps/com.cst8t.gitmun.png
        fi
      - sed -i 's/^Exec=.*/Exec=gitmun/' /app/share/applications/com.cst8t.gitmun.desktop
      - sed -i 's/^Icon=.*/Icon=com.cst8t.gitmun/' /app/share/applications/com.cst8t.gitmun.desktop
    sources:
      - type: dir
        path: rootfs
