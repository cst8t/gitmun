app-id: com.cst8t.gitmun
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: gitmun
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: gitmun-files
    buildsystem: simple
    build-commands:
      - |
        BIN_PATH=""
        for candidate in \
          usr/bin/gitmun \
          usr/lib/gitmun/gitmun \
          rootfs/usr/bin/gitmun \
          rootfs/usr/lib/gitmun/gitmun; do
          if [ -f "$candidate" ]; then
            BIN_PATH="$candidate"
            break
          fi
        done

        if [ -z "$BIN_PATH" ]; then
          echo "Unable to locate gitmun binary in extracted rootfs sources." >&2
          find . -maxdepth 5 -type f | sort >&2
          exit 1
        fi

        install -Dm755 "$BIN_PATH" /app/bin/gitmun
      - |
        DESKTOP_PATH=""
        for desktop_dir in usr/share/applications rootfs/usr/share/applications; do
          if [ -d "$desktop_dir" ]; then
            DESKTOP_PATH="$(find "$desktop_dir" -maxdepth 1 -type f -iname 'gitmun.desktop' | head -n 1)"
          fi
          if [ -n "$DESKTOP_PATH" ]; then
            break
          fi
        done
        if [ -z "$DESKTOP_PATH" ]; then
          for desktop_dir in usr/share/applications rootfs/usr/share/applications; do
            if [ -d "$desktop_dir" ]; then
              DESKTOP_PATH="$(find "$desktop_dir" -maxdepth 1 -type f -iname '*.desktop' | head -n 1)"
            fi
            if [ -n "$DESKTOP_PATH" ]; then
              break
            fi
          done
        fi

        if [ -z "$DESKTOP_PATH" ]; then
          echo "Unable to locate a desktop file in extracted rootfs sources." >&2
          find . -maxdepth 5 -type f | sort >&2
          exit 1
        fi

        install -Dm644 "$DESKTOP_PATH" /app/share/applications/com.cst8t.gitmun.desktop
      - |
        ICON_PATH=""
        for icon_dir in usr/share/icons/hicolor/128x128/apps rootfs/usr/share/icons/hicolor/128x128/apps; do
          if [ -d "$icon_dir" ]; then
            ICON_PATH="$(find "$icon_dir" -maxdepth 1 -type f -iname 'gitmun.png' | head -n 1)"
          fi
          if [ -n "$ICON_PATH" ]; then
            break
          fi
        done

        if [ -n "$ICON_PATH" ]; then
          install -Dm644 "$ICON_PATH" /app/share/icons/hicolor/128x128/apps/com.cst8t.gitmun.png
        fi
      - sed -i 's/^Exec=.*/Exec=gitmun/' /app/share/applications/com.cst8t.gitmun.desktop
      - sed -i 's/^Icon=.*/Icon=com.cst8t.gitmun/' /app/share/applications/com.cst8t.gitmun.desktop
    sources:
      - type: dir
        path: rootfs
