name: Warm xwin cache

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-bundles.yml
      - .github/workflows/warm-xwin-cache.yml
      - src-tauri/Cargo.lock
      - src-tauri/Cargo.toml

jobs:
  warm-xwin:
    name: Warm xwin cache
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache xwin (MSVC CRT / Windows SDK)
        id: cache-xwin
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/xwin
          key: xwin-v2-x86_64

      - name: Install cargo-xwin
        if: steps.cache-xwin.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - name: Populate xwin cache
        if: steps.cache-xwin.outputs.cache-hit != 'true'
        env:
          XWIN_CACHE_DIR: /home/runner/.cache/xwin
        run: cargo xwin cache xwin --xwin-arch x86_64 --xwin-cache-dir "$XWIN_CACHE_DIR"
