<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 512 512"
   width="512"
   height="512"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns:dc="http://purl.org/dc/elements/1.1/"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   inkscape:version="1.3"
   sodipodi:docname="gitmun-icon.inkscape.svg">

  <sodipodi:namedview
     id="namedview1"
     pagecolor="#0d1117"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="1"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     showgrid="false"
     inkscape:document-units="px">
  </sodipodi:namedview>

  <title>Gitmun Icon</title>

  <defs id="defs1">
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="176" y1="126" x2="176" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="featureGrad" x1="176" y1="270" x2="336" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#7c7ff5"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Layer: Background -->
  <g inkscape:label="Background" inkscape:groupmode="layer" id="layer-background">
    <rect
       id="background-rect"
       width="512" height="512" rx="112"
       fill="url(#bgGrad)"
       clip-path="url(#iconClip)"/>
  </g>

  <!-- Layer: Graph Lines -->
  <g inkscape:label="Graph Lines" inkscape:groupmode="layer" id="layer-lines">
    <line
       id="main-branch-line"
       x1="176" y1="126" x2="176" y2="390"
       stroke="url(#mainGrad)" stroke-width="14" stroke-linecap="round"/>
    <path
       id="feature-branch-curve"
       d="M176,270 C176,160 336,200 336,126"
       stroke="url(#featureGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Layer: Nodes -->
  <g inkscape:label="Nodes" inkscape:groupmode="layer" id="layer-nodes">

    <!-- Bottom commit -->
    <g id="node-bottom" inkscape:label="Node: Bottom commit">
      <circle cx="176" cy="390" r="20" fill="#0d1117" stroke="#6366f1" stroke-width="8"/>
      <circle cx="176" cy="390" r="7" fill="#818cf8"/>
    </g>

    <!-- Branch point -->
    <g id="node-branch-point" inkscape:label="Node: Branch point">
      <circle cx="176" cy="270" r="22" fill="#0d1117" stroke="#7c7ff5" stroke-width="8"/>
      <circle cx="176" cy="270" r="8" fill="#a5b4fc"/>
    </g>

    <!-- Top of main branch -->
    <g id="node-main-top" inkscape:label="Node: Main top">
      <circle cx="176" cy="126" r="20" fill="#0d1117" stroke="#818cf8" stroke-width="8"/>
      <circle cx="176" cy="126" r="7" fill="#a5b4fc"/>
    </g>

    <!-- Feature branch tip -->
    <g id="node-feature-tip" inkscape:label="Node: Feature tip">
      <circle cx="336" cy="126" r="22" fill="#0d1117" stroke="#a855f7" stroke-width="8"/>
      <circle cx="336" cy="126" r="8" fill="#c084fc"/>
    </g>

  </g>

</svg>
